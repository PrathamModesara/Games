<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="relative min-h-screen flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0 z-0 animate-gradient bg-gradient-to-r from-blue-400 via-purple-300 to-pink-400 opacity-80"></div>
  <div class="absolute inset-0 z-0 pointer-events-none" style="background-image: url('https://www.transparenttextures.com/patterns/diamond.png'); opacity: 0.15;"></div>
  <div class="relative z-10 w-full max-w-md p-6 bg-white rounded-2xl shadow-xl border border-gray-200">
    <h1 class="text-3xl font-extrabold mb-6 text-center text-purple-700 flex items-center justify-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2l4-4" /></svg>
      To-Do List
    </h1>
    <form id="todo-form" class="flex mb-6 gap-2">
      <input id="todo-input" type="text" placeholder="Add a new task..." class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-lg shadow-sm">
      <button type="submit" class="bg-gradient-to-r from-blue-500 to-purple-500 text-white px-5 py-3 rounded-lg font-semibold shadow hover:from-blue-600 hover:to-purple-600 transition">Add</button>
    </form>
    <div class="flex justify-between items-center mb-4">
      <div class="relative">
        <button id="options-btn" class="bg-gray-200 px-3 py-2 rounded-lg font-medium text-gray-700 hover:bg-gray-300 transition">Options ▼</button>
        <div id="options-menu" class="hidden absolute left-0 mt-2 w-40 bg-white border rounded-lg shadow-lg z-20">
          <button id="clear-btn" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-500">Clear All Tasks</button>
        </div>
      </div>
    </div>
    <ul id="todo-list" class="space-y-3"></ul>
  </div>
  <script src="app.js"></script>
  <style>
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient 8s ease-in-out infinite;
    }
  </style>
</body>
</html>
